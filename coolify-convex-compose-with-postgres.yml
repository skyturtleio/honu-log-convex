services:
  postgres:
    image: 'postgres:17-alpine'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'POSTGRES_DB=self_hosted_convex'
    healthcheck:
      test: 'pg_isready -U postgres'
      interval: 5s
      start_period: 10s
  backend:
    image: 'ghcr.io/get-convex/convex-backend:latest'
    volumes:
      - 'data:/convex/data'
    environment:
      - SERVICE_URL_BACKEND_3210
      - 'INSTANCE_NAME=${INSTANCE_NAME:-self-hosted-convex}'
      - 'INSTANCE_SECRET=${SERVICE_HEX_32_SECRET}'
      - 'CONVEX_RELEASE_VERSION_DEV=${CONVEX_RELEASE_VERSION_DEV:-}'
      - 'ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-}'
      - 'CONVEX_CLOUD_ORIGIN=${SERVICE_URL_BACKEND}'
      - 'CONVEX_SITE_ORIGIN=${SERVICE_URL_SITE}'
      - 'DATABASE_URL=${DATABASE_URL:-}'
      - 'DISABLE_BEACON=${DISABLE_BEACON:?false}'
      - 'REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:?false}'
      - 'DO_NOT_REQUIRE_SSL=${DO_NOT_REQUIRE_SSL:?true}'
      - 'POSTGRES_URL=postgresql://postgres:${SERVICE_PASSWORD_POSTGRES}@postgres:5432'
      - 'MYSQL_URL=${MYSQL_URL:-}'
      - 'RUST_LOG=${RUST_LOG:-info}'
      - 'RUST_BACKTRACE=${RUST_BACKTRACE:-}'
      - 'AWS_REGION=${AWS_REGION:-}'
      - 'AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}'
      - 'AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}'
      - 'AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}'
      - 'AWS_S3_FORCE_PATH_STYLE=${AWS_S3_FORCE_PATH_STYLE:-}'
      - 'AWS_S3_DISABLE_SSE=${AWS_S3_DISABLE_SSE:-}'
      - 'AWS_S3_DISABLE_CHECKSUMS=${AWS_S3_DISABLE_CHECKSUMS:-}'
      - 'S3_STORAGE_EXPORTS_BUCKET=${S3_STORAGE_EXPORTS_BUCKET:-}'
      - 'S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET=${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET:-}'
      - 'S3_STORAGE_MODULES_BUCKET=${S3_STORAGE_MODULES_BUCKET:-}'
      - 'S3_STORAGE_FILES_BUCKET=${S3_STORAGE_FILES_BUCKET:-}'
      - 'S3_STORAGE_SEARCH_BUCKET=${S3_STORAGE_SEARCH_BUCKET:-}'
      - 'S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: 'curl -f http://127.0.0.1:3210/version'
      interval: 5s
      start_period: 10s
  site:
    image: 'nginx:alpine'
    environment:
      - SERVICE_URL_SITE
      - BACKEND_HOST=backend
      - BACKEND_PORT=3211
    command: >
      sh -c "echo 'server {
        listen 80;
        location / {
          proxy_pass http://backend:3211;
          proxy_set_header Host \$$host;
          proxy_set_header X-Real-IP \$$remote_addr;
          proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto \$$scheme;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"upgrade\";
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      backend:
        condition: service_healthy
  dashboard:
    image: 'ghcr.io/get-convex/convex-dashboard:latest'
    environment:
      - SERVICE_URL_DASHBOARD_6791
      - 'NEXT_PUBLIC_DEPLOYMENT_URL=${SERVICE_URL_BACKEND}'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: 'curl -sf http://127.0.0.1:6791/ || exit 1'
      interval: 5s
      start_period: 5s
volumes:
  data:
  pgdata:
